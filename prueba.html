<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard – ThinkPaladar</title>
  <script type="module" src="https://dub01.online.tableau.com/javascripts/api/tableau.embedding.3.latest.min.js"></script>
  <style>
    body {
      font-family: sans-serif;
      background-color: #bfd1db;
      margin: 0;
    }

    header {
      background-color: #09578B;
      color: white;
      padding: 1rem;
      text-align: center;
    }

    .mensaje {
      text-align: center;
      margin: 2rem;
      font-size: 1.5rem;
      color: #333;
    }

    tableau-viz {
      display: block;
      width: 100%;
      height: 90vh;
      border: none;
    }
  </style>
</head>
<body>

  <header>
    ThinkPaladar Dashboard
  </header>

  <div class="mensaje">
    Por favor haga inicio de sesión
  </div>

  <tableau-viz 
    id="tableau-viz"
    src="https://dub01.online.tableau.com/t/thinkpaladar/views/prueeeba/Dashboard1"
    width="1000" 
    height="840"
    hide-tabs 
    toolbar="bottom">
  </tableau-viz>

  <script>
    const viz = document.getElementById("tableau-viz");

    viz.addEventListener("firstinteractive", () => {
      console.log("✅ Login realizado, redirigiendo a página principal...");
      setTimeout(() => {
        window.location.href = "index.html";
      }, 1000);
    });
  </script>

</body>
</html>
